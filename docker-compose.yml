version: '3.8'

# ── Forming Monitor ────────────────────────────────────────────────────────────
# restart: unless-stopped
#   → เปิดอัตโนมัติทุกครั้งที่ server reboot หรือ container พัง
#   → หยุดได้เฉพาะเมื่อสั่ง "docker compose down" หรือ "docker stop" ด้วยตนเอง
#   → ห้ามปิด container นี้จนกว่าจะปิดเครื่อง server จริงๆ
# ──────────────────────────────────────────────────────────────────────────────

services:
  forming-monitor:
    build: .
    container_name: forming-monitor
    ports:
      - "80:80"
    restart: unless-stopped

services:
  mysql:
    image: mysql:8.0
    container_name: forming_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_DATABASE: forming_monitor
      MYSQL_USER: forming_user
      MYSQL_PASSWORD: forming1234
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/sql/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  mysql_data: