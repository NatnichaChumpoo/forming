services:
  forming-monitor:
    build: .
    container_name: forming-monitor
    ports:
      - "80:80"
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    container_name: forming_backend
    restart: unless-stopped
    environment:
      PORT: "4000"
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_NAME: forming_monitor
      DB_USER: forming_user
      DB_PASSWORD: ${MYSQL_PASSWORD:-forming1234}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://10.255.255.173,http://localhost,http://localhost:5173}
    ports:
      - "4000:4000"
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.0
    container_name: forming_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root1234}
      MYSQL_DATABASE: forming_monitor
      MYSQL_USER: forming_user
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-forming1234}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
