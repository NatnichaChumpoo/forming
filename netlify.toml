# Netlify config — static deploy, no build step
# This project has no bundler: HTML + JSX (transpiled in-browser by Babel Standalone) + CSS

[build]
  publish = "."
  command = ""

# ── Caching ────────────────────────────────────────────────────────────────
# Component scripts are cache-busted via ?v=N in index.html (see <script> tags).
# So index.html MUST be fresh; everything else can cache long.

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/src/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Security headers ───────────────────────────────────────────────────────

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "same-origin"
