# ── Forming Monitor — nginx static server config ──────────────────────────────
# เสิร์ฟไฟล์แอปแบบ no-cache (ต้อง revalidate ทุกครั้ง) เพื่อให้เบราว์เซอร์
# โหลดโค้ดใหม่หลัง deploy โดยไม่ต้อง hard refresh และไม่ต้องคอย bump ?v= เอง
# ไฟล์ที่ไม่เปลี่ยนจะได้ 304 (เร็ว) ไฟล์ที่เปลี่ยนจะได้ 200 พร้อมโค้ดใหม่
# ──────────────────────────────────────────────────────────────────────────────

server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    location / {
        try_files $uri $uri/ =404;
        add_header Cache-Control "no-cache, must-revalidate";
    }
}
