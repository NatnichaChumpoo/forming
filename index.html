<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Forming Machine — Operations Monitor</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Manrope:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>

  <!-- App styles -->
  <link rel="stylesheet" href="src/styles.css"/>
</head>
<body>

  <!-- Stage wrapper (handles viewport scaling) -->
  <div class="stage-wrap">
    <div id="stage" class="stage">
      <div id="root"></div>
    </div>
  </div>

  <!-- CDN dependencies (no bundler required) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js"    crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"    crossorigin></script>
  <!-- xlsx-js-style: used ONLY for parseImportFile (XLSX.read).
       Kept separate from export so import continues to work without changes. -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js" crossorigin></script>
  <!-- ExcelJS: used for exportStatusFile — supports cell styles + image embedding.
       Exposes global ExcelJS object (different from XLSX, no conflict). -->
  <script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js" crossorigin></script>

  <!-- Map-fit script: scales only the floor-map canvas to its container.
       The rest of the UI flows responsively with the viewport. -->
  <script>
    (function () {
      const stage = document.getElementById('stage');
      if (!stage) return;
      stage.dataset.scale = 1;
      let observer = null;

      function fit() {
        const mapCanvas = document.querySelector('.map-canvas');
        const mapWrap   = document.querySelector('.map-canvas-scroll');
        if (!mapCanvas || !mapWrap) return;
        const cw = mapWrap.clientWidth, ch = mapWrap.clientHeight;
        if (cw <= 0 || ch <= 0) return;
        const s = Math.min(cw / 1520, ch / 770);
        mapCanvas.style.transformOrigin = 'top left';
        mapCanvas.style.transform = 'scale(' + s + ')';
        stage.dataset.scale = s;
        if (!observer && window.ResizeObserver) {
          observer = new ResizeObserver(fit);
          observer.observe(mapWrap);
        }
      }

      window.addEventListener('resize', fit);

      // Retry until React mounts the map, then attach the observer.
      let tries = 0;
      const iv = setInterval(function () {
        if (++tries > 200) { clearInterval(iv); return; }
        if (document.querySelector('.map-canvas')) {
          clearInterval(iv);
          fit();
        }
      }, 50);
    })();
  </script>

  <!-- Global React hooks (shared across all component scripts) -->
  <script>
    var useState    = React.useState;
    var useEffect   = React.useEffect;
    var useMemo     = React.useMemo;
    var useRef      = React.useRef;
    var useCallback = React.useCallback;
  </script>

  <!-- Data & utils (plain JS, no JSX) -->
  <script src="src/data/machines.js"></script>
  <script src="src/data/statuses.js"></script>
  <script src="src/utils/helpers.js"></script>
  <script src="src/utils/excel.js"></script>
  <script src="src/utils/parseImportFile.js"></script>

  <!-- Components (JSX — Babel transpiles each file) -->
  <!-- v2: bump ?v= when any component changes to bust the browser cache -->
  <script type="text/babel" data-presets="react" src="src/components/MachineSvgs.jsx?v=2"></script>
  <script type="text/babel" data-presets="react" src="src/components/FloorMap.jsx?v=2"></script>
  <script type="text/babel" data-presets="react" src="src/components/Sidebar.jsx?v=3"></script>
  <script type="text/babel" data-presets="react" src="src/components/MachineModal.jsx?v=5"></script>
  <script type="text/babel" data-presets="react" src="src/components/EditPage.jsx?v=2"></script>
  <script type="text/babel" data-presets="react" src="src/components/Dashboard.jsx?v=4"></script>
  <script type="text/babel" data-presets="react" src="src/main.jsx?v=2"></script>
</body>
</html>
